<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Time Office — Payroll</title>
  <link rel="stylesheet" href="Java Script And CSS/style.css" />
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-brand"><span>⏱</span> Time Office Automation</div>
  <div class="topbar-right">
    <div class="topbar-user" id="topbarUser"></div>
    <button class="btn-logout" onclick="logout()">Sign Out</button>
  </div>
</div>

<!-- NAV TABS -->
<nav class="nav-tabs">
  <a href="dashboard.html"  class="nav-tab">📊 Dashboard</a>
  <a href="shifts.html"     class="nav-tab">🤖 Shift Scheduling</a>
  <a href="attendance.html" class="nav-tab">📋 Attendance</a>
  <a href="payroll.html"    class="nav-tab active">💰 Payroll</a>
  <a href="settings.html"   class="nav-tab">⚙️ Settings</a>
</nav>

<!-- PAGE CONTENT -->
<div class="page-content">

  <div class="section-head">
    <h2>💰 Payroll Support</h2>
    <div class="section-actions">
      <div class="search-box form-field" style="min-width:200px;">
        <input type="text" id="paySearch" placeholder="Search employee..." oninput="renderPayroll()" />
      </div>
      <button class="btn btn-export" onclick="exportCSV('payroll')">⬇ Export CSV</button>
    </div>
  </div>

  <!-- CALCULATE PAYROLL FORM -->
  <div class="form-box">
    <div class="form-field">
      <label>Employee Name</label>
      <input id="pEmp" placeholder="e.g. Amit Verma" />
    </div>
    <div class="form-field">
      <label>Base Salary (₹)</label>
      <input id="pBase" type="number" placeholder="30000" />
    </div>
    <div class="form-field">
      <label>Days Worked</label>
      <input id="pWorked" type="number" placeholder="22" />
    </div>
    <div class="form-field">
      <label>Total Working Days</label>
      <input id="pTotal" type="number" placeholder="26" />
    </div>
    <div class="form-field">
      <label>Overtime Hours</label>
      <input id="pOT" type="number" placeholder="0" />
    </div>
    <div class="form-field">
      <label>Deductions (₹)</label>
      <input id="pDed" type="number" placeholder="0" />
    </div>
    <button class="btn btn-primary" onclick="calculatePayroll()">Calculate & Save</button>
  </div>

  <!-- LIVE RESULT CARD -->
  <div class="payroll-result" id="payResult">
    <div style="font-size:0.8rem;opacity:0.7;margin-bottom:4px;">NET PAY</div>
    <div class="net-pay" id="payNetDisplay">₹0</div>
    <div class="pay-breakdown">
      <div class="pay-item">Basic Pay<span id="payBasicDisp">₹0</span></div>
      <div class="pay-item">Overtime<span id="payOTDisp">₹0</span></div>
      <div class="pay-item">Deductions<span id="payDedDisp">₹0</span></div>
    </div>
  </div>

  <!-- PAYROLL TABLE -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Employee</th>
          <th>Base Salary</th>
          <th>Days Worked</th>
          <th>Overtime</th>
          <th>Deductions</th>
          <th>Net Pay</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="payBody"></tbody>
    </table>
  </div>

</div>

<div id="toast"></div>
<script src="Java Script And CSS/app.js"></script>
<script>checkAuth();</script>
</body>
</html>
