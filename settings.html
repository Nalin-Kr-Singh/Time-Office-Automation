<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Time Office — Settings</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="topbar">
  <div class="topbar-brand"><span>⏱</span> Time Office</div>
  <div class="topbar-right">
    <div class="topbar-user" id="topbarUser"></div>
    <button class="btn-logout" onclick="logout()">Sign Out</button>
  </div>
</div>
<nav class="nav-tabs">
  <a href="dashboard.html"  class="nav-tab">📊 Dashboard</a>
  <a href="employees.html"  class="nav-tab">👥 Employees</a>
  <a href="attendance.html" class="nav-tab">📋 Attendance</a>
  <a href="shifts.html"     class="nav-tab">🤖 Shifts</a>
  <a href="payroll.html"    class="nav-tab">💰 Payroll</a>
  <a href="settings.html"   class="nav-tab active">⚙️ Settings</a>
</nav>

<div class="pg">
  <div class="sec-head"><h2>⚙️ Settings</h2></div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px">

    <div class="set-card">
      <h3>🔐 Change PIN</h3>
      <div class="ff"><label>Current PIN</label><input type="password" id="oldPin" maxlength="4" placeholder="Current PIN"/></div>
      <div class="ff"><label>New PIN (4 digits)</label><input type="password" id="newPin" maxlength="4" placeholder="New PIN"/></div>
      <div class="ff"><label>Confirm New PIN</label><input type="password" id="confirmPin" maxlength="4" placeholder="Confirm PIN"/></div>
      <button class="btn btn-primary" onclick="changePin()">Update PIN</button>
      <div id="pinMsg" style="margin-top:10px;font-size:.82rem"></div>
    </div>

    <div class="set-card">
      <h3>👤 Profile</h3>
      <div class="ff"><label>Admin Name</label><input id="adminName" placeholder="Your name"/></div>
      <div class="ff"><label>Organization</label><input id="orgName" placeholder="Company name"/></div>
      <button class="btn btn-primary" onclick="saveProfile()">Save Profile</button>
    </div>

    <div class="set-card">
      <h3>🗑 Data Management</h3>
      <p style="font-size:.83rem;color:#888;margin-bottom:14px">Permanently clear stored data. Export CSV first as backup.</p>
      <div style="display:flex;gap:9px;flex-wrap:wrap">
        <button class="btn" style="background:#fde8e6;color:#a32020" onclick="clearData('employees')">Clear Employees</button>
        <button class="btn" style="background:#fde8e6;color:#a32020" onclick="clearData('attendance')">Clear Attendance</button>
        <button class="btn" style="background:#dc3545;color:#fff" onclick="clearData('all')">Clear All Data</button>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>
<script src="app.js"></script>
<script>checkAuth();</script>
</body>
</html>
